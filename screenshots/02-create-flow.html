<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1290">
<title>StoryPal — Create Flow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  body {
    width: 1290px;
    height: 2796px;
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
    background: linear-gradient(165deg, #A18CD1 0%, #FBC2EB 50%, #F6D5F7 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .tagline-area {
    text-align: center;
    padding-top: 120px;
    padding-bottom: 60px;
  }
  .tagline {
    font-size: 64px;
    font-weight: 900;
    color: #fff;
    line-height: 1.15;
    letter-spacing: -1px;
    text-shadow: 0 4px 30px rgba(0,0,0,0.12);
  }
  .tagline em {
    font-style: normal;
    background: linear-gradient(90deg, #FFE66D, #FFF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 32px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    margin-top: 16px;
  }

  .phone-frame {
    width: 420px;
    height: 860px;
    border-radius: 60px;
    background: #000;
    padding: 14px;
    box-shadow:
      0 50px 100px rgba(0,0,0,0.3),
      0 20px 60px rgba(0,0,0,0.2),
      inset 0 0 0 2px rgba(255,255,255,0.1);
    position: relative;
    transform: scale(2.5);
    transform-origin: top center;
    margin-top: 20px;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 48px;
    background: #FFF8F0;
    overflow: hidden;
    position: relative;
  }

  .phone-notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
    height: 34px;
    background: #000;
    border-radius: 0 0 20px 20px;
    z-index: 10;
  }

  .app-content {
    padding: 60px 24px 24px;
    height: 100%;
    overflow: hidden;
  }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .back { font-size: 14px; font-weight: 700; color: #FF6B6B; }
  .steps {
    display: flex;
    gap: 4px;
  }
  .step {
    width: 8px;
    height: 8px;
    border-radius: 4px;
    background: #9B9B9B;
    opacity: 0.3;
  }
  .step.done { background: #6BCB77; opacity: 1; }
  .step.active { width: 20px; background: #FF6B6B; opacity: 1; }

  .page-title {
    font-size: 26px;
    font-weight: 900;
    color: #2D2D2D;
    margin-bottom: 4px;
  }
  .page-subtitle {
    font-size: 13px;
    color: #6B6B6B;
    margin-bottom: 14px;
  }

  /* Theme grid */
  .theme-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .theme-item {
    width: calc(50% - 5px);
    height: 100px;
    border-radius: 18px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    position: relative;
  }
  .theme-item.selected {
    outline: 3px solid #fff;
    outline-offset: -3px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }
  .theme-item .emoji { font-size: 28px; margin-bottom: 4px; }
  .theme-item .name { font-size: 13px; font-weight: 800; color: #fff; }
  .theme-item .check {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 24px;
    height: 24px;
    border-radius: 12px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  /* Character section */
  .char-section {
    margin-top: 18px;
  }
  .section-label {
    font-size: 16px;
    font-weight: 800;
    color: #2D2D2D;
    margin-bottom: 10px;
  }
  .cat-scroll {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .cat-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 14px;
    border-radius: 50px;
    background: #fff;
    border: 2px solid transparent;
    font-size: 12px;
    font-weight: 700;
    color: #6B6B6B;
    box-shadow: 0 2px 6px rgba(255,107,107,0.08);
    white-space: nowrap;
  }
  .cat-chip.active {
    border-color: #FF6B6B;
    background: #FFF0EE;
    color: #FF6B6B;
  }
  .cat-chip .ce { font-size: 15px; }

  .char-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .char-card {
    width: calc(50% - 4px);
    background: #fff;
    border-radius: 16px;
    padding: 12px;
    text-align: center;
    box-shadow: 0 4px 12px rgba(255,107,107,0.1);
  }
  .char-card .avatar {
    width: 50px;
    height: 50px;
    border-radius: 25px;
    background: #FFF0E0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 6px;
    font-size: 28px;
  }
  .char-card .n { font-size: 13px; font-weight: 800; color: #2D2D2D; }
  .char-card .d { font-size: 10px; color: #9B9B9B; line-height: 1.3; }
</style>
</head>
<body>
  <div class="tagline-area">
    <div class="tagline"><em>10 Themes</em>, 20+<br>Characters to Choose</div>
    <div class="subtitle">Every story is unique and personal</div>
  </div>

  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="phone-screen">
      <div class="app-content">
        <div class="nav-row">
          <div class="back">← Back</div>
          <div class="steps">
            <div class="step done"></div>
            <div class="step active"></div>
            <div class="step"></div>
            <div class="step"></div>
            <div class="step"></div>
            <div class="step"></div>
          </div>
        </div>

        <div class="page-title">Choose a Theme 🎨</div>
        <div class="page-subtitle">Pick the world for your adventure</div>

        <div class="theme-grid">
          <div class="theme-item selected" style="background:linear-gradient(135deg,#6C5CE7,#A29BFE)">
            <div class="check">✓</div>
            <div class="emoji">🚀</div>
            <div class="name">Space</div>
          </div>
          <div class="theme-item" style="background:linear-gradient(135deg,#00B4D8,#48CAE4)">
            <div class="emoji">🌊</div>
            <div class="name">Ocean</div>
          </div>
          <div class="theme-item" style="background:linear-gradient(135deg,#52B788,#95D5B2)">
            <div class="emoji">🌲</div>
            <div class="name">Forest</div>
          </div>
          <div class="theme-item" style="background:linear-gradient(135deg,#E9C46A,#F4A261)">
            <div class="emoji">🏰</div>
            <div class="name">Castle</div>
          </div>
          <div class="theme-item" style="background:linear-gradient(135deg,#E76F51,#F4A261)">
            <div class="emoji">🦕</div>
            <div class="name">Dinosaur</div>
          </div>
          <div class="theme-item" style="background:linear-gradient(135deg,#E0AAFF,#C77DFF)">
            <div class="emoji">🧚</div>
            <div class="name">Fairy</div>
          </div>
        </div>

        <div class="char-section">
          <div class="section-label">Characters 🌟</div>
          <div class="cat-scroll">
            <div class="cat-chip active"><span class="ce">✨</span> All</div>
            <div class="cat-chip"><span class="ce">🦸</span> Heroes</div>
            <div class="cat-chip"><span class="ce">🐾</span> Animals</div>
            <div class="cat-chip"><span class="ce">🤖</span> Fantasy</div>
          </div>
          <div class="char-grid">
            <div class="char-card">
              <div class="avatar">🧝‍♀️</div>
              <div class="n">Luna</div>
              <div class="d">Brave adventurer</div>
            </div>
            <div class="char-card">
              <div class="avatar">🐉</div>
              <div class="n">Spark</div>
              <div class="d">Baby dragon</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
