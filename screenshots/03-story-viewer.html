<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1284">
<title>StoryPal — Story Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  body {
    width: 1284px;
    height: 2778px;
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
    background: linear-gradient(165deg, #4ECDC4 0%, #44B09E 40%, #2E8B7A 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .tagline-area {
    text-align: center;
    padding-top: 120px;
    padding-bottom: 60px;
  }
  .tagline {
    font-size: 64px;
    font-weight: 900;
    color: #fff;
    line-height: 1.15;
    letter-spacing: -1px;
    text-shadow: 0 4px 30px rgba(0,0,0,0.15);
  }
  .tagline em {
    font-style: normal;
    background: linear-gradient(90deg, #FFE66D, #FFF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 32px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    margin-top: 16px;
  }

  .phone-frame {
    width: 420px;
    height: 860px;
    border-radius: 60px;
    background: #000;
    padding: 14px;
    box-shadow:
      0 50px 100px rgba(0,0,0,0.3),
      0 20px 60px rgba(0,0,0,0.2),
      inset 0 0 0 2px rgba(255,255,255,0.1);
    position: relative;
    transform: scale(2.5);
    transform-origin: top center;
    margin-top: 20px;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 48px;
    overflow: hidden;
    position: relative;
  }

  .phone-notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
    height: 34px;
    background: #000;
    border-radius: 0 0 20px 20px;
    z-index: 10;
  }

  /* Story page */
  .story-bg {
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, #E8F5E9 0%, #C8E6C9 30%, #A5D6A7 60%, #81C784 100%);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .illustration-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding-top: 40px;
  }

  .illustration {
    width: 320px;
    height: 300px;
    border-radius: 24px;
    background: linear-gradient(135deg, #A5D6A7 0%, #66BB6A 50%, #388E3C 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }

  .illus-scene {
    font-size: 100px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));
  }
  .illus-bg-elements {
    position: absolute;
    font-size: 36px;
    opacity: 0.4;
  }
  .illus-bg-1 { top: 20px; left: 30px; }
  .illus-bg-2 { top: 40px; right: 40px; font-size: 28px; }
  .illus-bg-3 { bottom: 40px; left: 50px; font-size: 24px; }
  .illus-bg-4 { bottom: 30px; right: 30px; font-size: 32px; }

  .story-gradient-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 300px;
    background: linear-gradient(transparent, rgba(255,248,240,0.9), #FFF8F0);
  }

  .text-card {
    position: relative;
    z-index: 2;
    margin: 0 20px 110px;
    background: rgba(255,255,255,0.88);
    border-radius: 20px;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.4);
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    backdrop-filter: blur(10px);
  }
  .text-card p {
    font-size: 16px;
    font-weight: 600;
    color: #2D2D2D;
    line-height: 1.7;
    text-align: center;
  }

  /* Top nav */
  .top-nav {
    position: absolute;
    top: 44px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }
  .nav-btn {
    width: 38px;
    height: 38px;
    border-radius: 19px;
    background: rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #fff;
    font-weight: 700;
    backdrop-filter: blur(8px);
  }
  .page-badge {
    background: rgba(255,255,255,0.25);
    padding: 4px 14px;
    border-radius: 50px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    backdrop-filter: blur(8px);
  }

  /* Bottom nav */
  .bottom-nav {
    position: absolute;
    bottom: 30px;
    left: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
  }
  .arrow-btn {
    width: 44px;
    height: 44px;
    border-radius: 22px;
    background: rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #fff;
    font-weight: 700;
    backdrop-filter: blur(8px);
  }
  .play-btn {
    width: 50px;
    height: 50px;
    border-radius: 25px;
    background: linear-gradient(135deg, #FF6B6B, #FF8E53);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 16px rgba(255,107,107,0.4);
  }
  .dots {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.3);
  }
  .dot.active {
    width: 16px;
    background: #fff;
  }
  .page-num {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: #9B9B9B;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="tagline-area">
    <div class="tagline">Beautiful <em>Illustrated</em><br>Storybooks</div>
    <div class="subtitle">AI writes & illustrates every page</div>
  </div>

  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="phone-screen">
      <div class="story-bg">
        <div class="top-nav">
          <div class="nav-btn">✕</div>
          <div class="page-badge">3 / 8</div>
          <div class="nav-btn">🎵</div>
        </div>

        <div class="illustration-area">
          <div class="illustration">
            <div class="illus-bg-elements illus-bg-1">🌿</div>
            <div class="illus-bg-elements illus-bg-2">🦋</div>
            <div class="illus-bg-elements illus-bg-3">🍄</div>
            <div class="illus-bg-elements illus-bg-4">🌸</div>
            <div class="illus-scene">🐉</div>
          </div>
        </div>

        <div class="story-gradient-overlay"></div>

        <div class="text-card">
          <p>Spark fluttered his tiny wings and landed on a giant mushroom. "Look!" he squeaked. A rainbow waterfall sparkled through the enchanted trees.</p>
        </div>

        <div class="page-num">3</div>

        <div class="bottom-nav">
          <div class="arrow-btn">←</div>
          <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="play-btn">▶️</div>
          <div class="dots">
            <!-- spacer -->
          </div>
          <div class="arrow-btn">→</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
