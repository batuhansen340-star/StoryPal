<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1284">
<title>StoryPal — Bedtime Mode</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  body {
    width: 1284px;
    height: 2778px;
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
    background: linear-gradient(165deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Floating stars on background */
  .bg-star {
    position: absolute;
    color: rgba(255,255,255,0.15);
    font-size: 24px;
  }
  .bg-star:nth-child(1) { top: 80px; left: 120px; font-size: 18px; }
  .bg-star:nth-child(2) { top: 200px; right: 180px; font-size: 32px; }
  .bg-star:nth-child(3) { top: 350px; left: 200px; font-size: 14px; }
  .bg-star:nth-child(4) { top: 150px; right: 350px; font-size: 20px; }
  .bg-star:nth-child(5) { top: 280px; left: 80px; font-size: 28px; }

  .tagline-area {
    text-align: center;
    padding-top: 120px;
    padding-bottom: 60px;
    position: relative;
    z-index: 2;
  }
  .tagline {
    font-size: 64px;
    font-weight: 900;
    color: #fff;
    line-height: 1.15;
    letter-spacing: -1px;
    text-shadow: 0 4px 30px rgba(0,0,0,0.3);
  }
  .tagline em {
    font-style: normal;
    background: linear-gradient(90deg, #FFE66D, #FBC2EB);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 32px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    margin-top: 16px;
  }

  .phone-frame {
    width: 420px;
    height: 860px;
    border-radius: 60px;
    background: #000;
    padding: 14px;
    box-shadow:
      0 50px 100px rgba(0,0,0,0.5),
      0 20px 60px rgba(0,0,0,0.4),
      0 0 120px rgba(15,52,96,0.5),
      inset 0 0 0 2px rgba(255,255,255,0.05);
    position: relative;
    transform: scale(2.5);
    transform-origin: top center;
    margin-top: 20px;
    z-index: 2;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 48px;
    overflow: hidden;
    position: relative;
  }

  .phone-notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
    height: 34px;
    background: #000;
    border-radius: 0 0 20px 20px;
    z-index: 10;
  }

  /* Bedtime story page */
  .bedtime-bg {
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Stars */
  .star {
    position: absolute;
    color: rgba(255,255,255,0.5);
  }
  .star:nth-of-type(1) { top: 60px; left: 40px; font-size: 14px; }
  .star:nth-of-type(2) { top: 100px; right: 60px; font-size: 10px; }
  .star:nth-of-type(3) { top: 80px; left: 160px; font-size: 18px; }
  .star:nth-of-type(4) { top: 140px; right: 120px; font-size: 12px; }
  .star:nth-of-type(5) { top: 180px; left: 80px; font-size: 16px; }

  .moon-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 20px;
  }
  .moon { font-size: 120px; filter: drop-shadow(0 0 40px rgba(255,215,0,0.3)); }
  .cloud-row {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    opacity: 0.3;
    font-size: 30px;
  }

  /* Text card bedtime */
  .bedtime-text-card {
    margin: 0 20px 110px;
    background: rgba(15, 52, 96, 0.85);
    border-radius: 20px;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    position: relative;
    z-index: 2;
  }
  .bedtime-text-card p {
    font-size: 16px;
    font-weight: 500;
    color: #E8E8F0;
    line-height: 1.8;
    text-align: center;
  }

  /* Top nav */
  .top-nav {
    position: absolute;
    top: 44px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
  }
  .nav-btn {
    width: 38px;
    height: 38px;
    border-radius: 19px;
    background: rgba(15,52,96,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #fff;
    font-weight: 700;
  }
  .page-badge {
    background: rgba(15,52,96,0.6);
    padding: 4px 14px;
    border-radius: 50px;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
  }

  /* Bottom nav */
  .bottom-nav {
    position: absolute;
    bottom: 30px;
    left: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
  }
  .arrow-btn {
    width: 44px;
    height: 44px;
    border-radius: 22px;
    background: rgba(15,52,96,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #fff;
    font-weight: 700;
  }
  .play-btn {
    width: 50px;
    height: 50px;
    border-radius: 25px;
    background: linear-gradient(135deg, #0f3460, #1a1a2e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .dots {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .dot { width: 6px; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.15); }
  .dot.active { width: 16px; background: rgba(255,255,255,0.6); }

  /* Controls panel floating */
  .controls-panel {
    position: absolute;
    top: 90px;
    right: 16px;
    background: #16213e;
    border-radius: 16px;
    padding: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 10;
    min-width: 170px;
  }
  .ctrl-row {
    display: flex;
    align-items: center;
    padding: 6px 8px;
    border-radius: 10px;
    gap: 8px;
  }
  .ctrl-row.active { background: rgba(255,107,107,0.1); }
  .ctrl-emoji { font-size: 14px; }
  .ctrl-label { flex: 1; font-size: 12px; font-weight: 700; color: #E8E8F0; }
  .toggle {
    width: 34px;
    height: 18px;
    border-radius: 9px;
    background: #E0E0E0;
    position: relative;
  }
  .toggle.on { background: #FF6B6B; }
  .toggle .thumb {
    width: 14px;
    height: 14px;
    border-radius: 7px;
    background: #fff;
    position: absolute;
    top: 2px;
    left: 2px;
  }
  .toggle.on .thumb { left: auto; right: 2px; }
  .speed-badge {
    background: rgba(255,248,240,0.1);
    padding: 2px 8px;
    border-radius: 50px;
    font-size: 10px;
    font-weight: 800;
    color: #FF6B6B;
  }
  .ctrl-divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 2px 0;
  }
</style>
</head>
<body>
  <div class="bg-star">⭐</div>
  <div class="bg-star">✨</div>
  <div class="bg-star">🌟</div>
  <div class="bg-star">⭐</div>
  <div class="bg-star">✨</div>

  <div class="tagline-area">
    <div class="tagline"><em>Bedtime Mode</em><br>with Narration</div>
    <div class="subtitle">Soothing stories for sweet dreams</div>
  </div>

  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="phone-screen">
      <div class="bedtime-bg">
        <div class="star">⭐</div>
        <div class="star">✨</div>
        <div class="star">🌟</div>
        <div class="star">⭐</div>
        <div class="star">✨</div>

        <div class="top-nav">
          <div class="nav-btn">✕</div>
          <div class="page-badge">5 / 8</div>
          <div class="nav-btn">🎵</div>
        </div>

        <div class="controls-panel">
          <div class="ctrl-row active">
            <div class="ctrl-emoji">🌙</div>
            <div class="ctrl-label">Bedtime Mode</div>
            <div class="toggle on"><div class="thumb"></div></div>
          </div>
          <div class="ctrl-row">
            <div class="ctrl-emoji">🔄</div>
            <div class="ctrl-label">Auto-Play</div>
            <div class="toggle on"><div class="thumb"></div></div>
          </div>
          <div class="ctrl-row">
            <div class="ctrl-emoji">⏩</div>
            <div class="ctrl-label">Speed</div>
            <div class="speed-badge">Slow</div>
          </div>
          <div class="ctrl-divider"></div>
          <div class="ctrl-row">
            <div class="ctrl-emoji">🎤</div>
            <div class="ctrl-label">Parent Voice</div>
            <div class="toggle"><div class="thumb"></div></div>
          </div>
        </div>

        <div class="moon-area">
          <div class="moon">🌙</div>
          <div class="cloud-row">
            <span>☁️</span>
            <span>⭐</span>
            <span>☁️</span>
          </div>
        </div>

        <div class="bedtime-text-card">
          <p>The little bear yawned and snuggled into his warm blanket. The stars twinkled softly above, singing a lullaby just for him...</p>
        </div>

        <div class="bottom-nav">
          <div class="arrow-btn">←</div>
          <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="play-btn">⏸️</div>
          <div class="dots"></div>
          <div class="arrow-btn">→</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
